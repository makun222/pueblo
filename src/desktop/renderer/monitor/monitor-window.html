<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pueblo Loop Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #58a6ff; }
    .job-list { display: flex; flex-direction: column; gap: 8px; }
    .job-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
    }
    .job-card .job-id { font-family: monospace; font-size: 12px; color: #8b949e; }
    .job-card .job-status { font-size: 14px; margin-top: 4px; }
    .job-card .job-status.running { color: #3fb950; }
    .job-card .job-status.completed { color: #58a6ff; }
    .job-card .job-status.error { color: #f85149; }
    .job-card .job-progress { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .empty-state { color: #484f58; font-style: italic; padding: 24px; text-align: center; }
    .job-card .cancel-btn {
      margin-left: 12px;
      padding: 3px 12px;
      font-size: 12px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .job-card .cancel-btn:hover {
      background: #b71c1c;
    }
    .job-card .cancel-btn:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .job-card .pause-btn {
      margin-left: 8px;
      padding: 3px 12px;
      font-size: 12px;
      background: #d29922;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .job-card .pause-btn:hover {
      background: #9e6a03;
    }
    .job-card .pause-btn:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .job-card .resume-btn {
      margin-left: 4px;
      padding: 3px 12px;
      font-size: 12px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .job-card .resume-btn:hover {
      background: #196c2e;
    }
    .job-card .resume-btn:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }
    .job-card .job-output {
      display: none;
      margin-top: 8px;
      border-top: 1px solid #30363d;
      padding-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
    }
    .job-card .job-output .round-output {
      padding: 4px 8px;
      margin-bottom: 4px;
      background: #0d1117;
      border-radius: 4px;
      color: #7ee787;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .job-card .job-output .final-output {
      padding: 8px;
      background: #0d1117;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Loop Monitor</h1>
  <div id="jobList" class="job-list">
    <div class="empty-state">No active loop jobs.</div>
  </div>
  <script src="./monitor-renderer.js"></script>
</body>
</html>

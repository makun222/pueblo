<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeskClock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  #glass {
    position: absolute;
    inset: 12px;
    border-radius: 22px;
    background: rgba(20, 22, 32, 0.72);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 8px 48px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }
  #container {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    z-index: 1;
  }
  #digital {
    position: absolute;
    bottom: 34px;
    font-family: 'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 250;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 2px 16px rgba(0,0,0,0.7);
    z-index: 2;
    -webkit-app-region: no-drag;
  }
  #date {
    position: absolute;
    top: 28px;
    font-family: 'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 2;
    -webkit-app-region: no-drag;
  }
</style>
</head>
<body>
<div id="glass"></div>
<div id="container">
  <div id="date"></div>
  <canvas id="clock"></canvas>
  <div id="digital"></div>
</div>
<script>
  const canvas = document.getElementById('clock');
  const ctx = canvas.getContext('2d');
  const digitalEl = document.getElementById('digital');
  const dateEl = document.getElementById('date');

  const SIZE = 260;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = SIZE * dpr;
  canvas.height = SIZE * dpr;
  canvas.style.width = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
  ctx.scale(dpr, dpr);

  const cx = SIZE / 2, cy = SIZE / 2;
  const r = SIZE / 2 - 18;

  // ──  tick mark cache ──
  const ticks = [];
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isHour = i % 5 === 0;
    const len = isHour ? 14 : 6;
    const innerR = r - (isHour ? 20 : 8);
    ticks.push({ angle, len, innerR, isHour });
  }

  function drawFace() {
    // outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // inner subtle ring
    ctx.beginPath();
    ctx.arc(cx, cy, r - 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // tick marks
    for (const t of ticks) {
      const x1 = cx + Math.cos(t.angle) * t.innerR;
      const y1 = cy + Math.sin(t.angle) * t.innerR;
      const x2 = cx + Math.cos(t.angle) * (t.innerR + t.len);
      const y2 = cy + Math.sin(t.angle) * (t.innerR + t.len);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = t.isHour ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.18)';
      ctx.lineWidth = t.isHour ? 1.8 : 0.7;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 5.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawHand(angle, length, width, color, shadow) {
    const ex = cx + Math.cos(angle) * length;
    const ey = cy + Math.sin(angle) * length;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    if (shadow) {
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 2;
    }
    ctx.stroke();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  function tick() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    // smooth second angle (includes sub-second)
    const secAngle = ((s + ms / 1000) / 60) * Math.PI * 2 - Math.PI / 2;
    const minAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
    const hrAngle = ((h % 12 + m / 60 + s / 3600) / 12) * Math.PI * 2 - Math.PI / 2;

    ctx.clearRect(0, 0, SIZE, SIZE);

    drawFace();

    // hour hand
    drawHand(hrAngle, r * 0.50, 4.5, 'rgba(255,255,255,0.88)', true);
    // minute hand
    drawHand(minAngle, r * 0.74, 3.0, 'rgba(255,255,255,0.75)', true);
    // second hand (red accent)
    drawHand(secAngle, r * 0.82, 1.2, 'rgba(255,100,110,0.9)', false);

    // second hand tail dot
    const tailR = 14;
    const tx = cx - Math.cos(secAngle) * tailR;
    const ty = cy - Math.sin(secAngle) * tailR;
    ctx.beginPath();
    ctx.arc(tx, ty, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,100,110,0.75)';
    ctx.fill();

    // digital time
    const hh = String(h).padStart(2, '0');
    const mm = String(m).padStart(2, '0');
    const ss = String(s).padStart(2, '0');
    digitalEl.textContent = hh + ':' + mm + ':' + ss;

    // date
    const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    dateEl.textContent = weekdays[now.getDay()] + '  ' + months[now.getMonth()] + ' ' + now.getDate();

    requestAnimationFrame(tick);
  }

  // ──  context menu → close  ──
  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    window.close();
  });

  requestAnimationFrame(tick);
</script>
</body>
</html>
